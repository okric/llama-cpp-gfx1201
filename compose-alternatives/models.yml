# docker-compose.yml
services:
    llama-cpp:
        image: llama-cpp-turboquant
        container_name: llama-cpp
        restart: unless-stopped
        privileged: true
        security_opt:
            - seccomp=unconfined
        devices:
            - /dev/kfd
            - /dev/dri
        ports:
            - "11433:11433"
        healthcheck:
            test: curl -sf http://localhost:11433/v1/models
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s
        volumes:
            - ./models:/models:rw
        command: >
            --models-dir /models
            --models-autoload
            --models-max 1
            --host 0.0.0.0
            --port 11433
