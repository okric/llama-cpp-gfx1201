# docker-compose.yml
services:
    llama-cpp:
        image: llama-rocm72-vulkan
        container_name: llama-cpp
        restart: unless-stopped
        privileged: true
        security_opt:
            - seccomp=unconfined
        devices:
            - /dev/kfd
            - /dev/dri
        ports:
            - "11433:11433"
        healthcheck:
            test: curl -sf http://localhost:11433/v1/models
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s
        volumes:
            - ./models:/models:ro
            - ./mmproj:/mmproj:ro
        environment:
            - GGML_VK_ALLOW_GRAPHICS_QUEUE=1
        # GGML_VK_ALLOW_GRAPHICS_QUEUE increases tg by 20% and pp by 6%
        # - GGML_VK_DISABLE_COOPMAT=1
        # GGML_VK_DISABLE_COOPMAT increases tg by 5% but reduces pp by 45%
        command: >
            --models-dir /models
            --models-preset /models/models.ini
            --models-autoload
            --models-max 1
            --host 0.0.0.0
            --port 11433
