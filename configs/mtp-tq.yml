# docker-compose.yml
services:
    llama-cpp:
        image: llama-cpp-turboquant
        container_name: llama-cpp
        restart: unless-stopped
        privileged: true
        security_opt:
            - seccomp=unconfined
        devices:
            - /dev/kfd
            - /dev/dri
        ports:
            - "11433:11433"
        healthcheck:
            test: curl -sf http://localhost:11433/v1/models
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s
        volumes:
            - ./models:/models:rw
        command: >
            --model /models/Qwen3.6-27B-UD-Q5_K_XL-MTP.gguf
            --spec-type draft-mtp
            --spec-draft-n-max 2
            --ctx-size 262144
            -ctk turbo3
            -ctv turbo3
            --reasoning auto
            --temperature 0.6
            --presence-penalty 0.0
            --top-p 0.95
            --top-k 20
            --min-p 0.00
            --jinja
            -ngl 999
            -np 1
            -b 2048
            -ub 512
            --mlock
            -fa on
            --host 0.0.0.0
            --port 11433
