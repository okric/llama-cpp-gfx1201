# docker-compose.yml
services:
    llama-cpp:
        image: ghcr.io/ggml-org/llama.cpp:server-rocm
        container_name: llama-cpp
        restart: unless-stopped
        privileged: true
        security_opt:
            - seccomp=unconfined
        devices:
            - /dev/kfd
            - /dev/dri
        ports:
            - "11433:11433"
        healthcheck:
            test: curl -sf http://localhost:11433/v1/models
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s
        volumes:
            - ./models:/models:rw
        command: >
            --models-dir /models
            --reasoning auto
            --reasoning-format deepseek
            --jinja
            -ngl 999
            -c 92160
            -np 2
            -b 4096
            -ub 1024
            --mlock
            -fa on
            -ctk q8_0
            -ctv q8_0
            --cache-ram 4096
            --host 0.0.0.0
            --port 11433
